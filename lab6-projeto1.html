<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Volume de chuva acumulada por ano (2016 a 2025) - Fazenda Carnaúba - Taperoá - PB</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f1621; font-family: 'Segoe UI', Arial, sans-serif; }
  #main { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="main"></div>
<script>

const chuvaData = [
  { ano: 2013, total: 280.0 },
  { ano: 2014, total: 404.6 },
  { ano: 2015, total: 386.7 },
  { ano: 2016, total: 295.0 },
  { ano: 2017, total: 211.5 },
  { ano: 2018, total: 764.8 },
  { ano: 2019, total: 497.9 },
  { ano: 2020, total: 591.3 },
  { ano: 2021, total: 388.5 },
  { ano: 2022, total: 938.6 },
  { ano: 2023, total: 465.6 },
  { ano: 2024, total: 378.2 },
  { ano: 2025, total: 528.5 },
  { ano: 2026, total: 341.9 }
];


const recorte = chuvaData.filter(function (d) { return d.ano >= 2016 && d.ano <= 2025; });
const anos = recorte.map(function (d) { return d.ano; });
const totais = recorte.map(function (d) { return d.total; });

var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom, null, { renderer: 'canvas' });

var option = {
  backgroundColor: '#0f1621',
  title: {
    text: 'Volume de chuva acumulada por ano (2016 a 2025)',
    subtext: 'Fazenda Carnaúba - Taperoá - PB',
    left: 'center',
    top: 15,
    textStyle: { color: '#e8f0fe', fontSize: 20, fontWeight: 'bold' },
    subtextStyle: { color: '#8ea3c0', fontSize: 13 }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross', label: { backgroundColor: '#37A2FF' } },
    formatter: function (params) {
      var p = params[0];
      return '<b>' + p.axisValue + '</b><br/>' +
             'Total acumulado: <b>' + p.value.toFixed(1) + ' mm</b>';
    }
  },
  toolbox: {
    feature: {
      saveAsImage: { title: 'Salvar imagem' },
      restore: { title: 'Restaurar' }
    },
    iconStyle: { borderColor: '#8ea3c0' },
    right: 30,
    top: 15
  },
  grid: { left: '6%', right: '6%', bottom: '18%', top: '20%', containLabel: true },
  xAxis: {
    type: 'category',
    boundaryGap: false,
    data: anos,
    axisLine: { lineStyle: { color: '#8ea3c0' } },
    axisLabel: { color: '#c9d6e8', fontSize: 13 }
  },
  yAxis: {
    type: 'value',
    name: 'Chuva acumulada (mm)',
    nameTextStyle: { color: '#8ea3c0' },
    axisLine: { show: false },
    axisLabel: { color: '#c9d6e8' },
    splitLine: { lineStyle: { color: '#22304a' } }
  },
  dataZoom: [
    { type: 'inside', start: 0, end: 100 },
    { type: 'slider', start: 0, end: 100, bottom: 30, textStyle: { color: '#c9d6e8' },
      borderColor: '#22304a', fillerColor: 'rgba(55,162,255,0.25)', handleStyle: { color: '#37A2FF' } }
  ],
  series: [
    {
      name: 'Chuva acumulada',
      type: 'line',
      smooth: true,
      symbol: 'circle',
      symbolSize: 8,
      showSymbol: true,
      lineStyle: { width: 3, color: '#37A2FF' },
      itemStyle: { color: '#37A2FF', borderColor: '#fff', borderWidth: 1 },
      areaStyle: {
        opacity: 0.85,
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(55, 162, 255, 0.65)' },
          { offset: 1, color: 'rgba(55, 162, 255, 0.02)' }
        ])
      },
      emphasis: { focus: 'series' },
      data: totais
    }
  ]
};

myChart.setOption(option);
window.addEventListener('resize', function () { myChart.resize(); });
</script>
</body>
</html>
